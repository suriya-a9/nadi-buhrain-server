<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Nadi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .logo {
      display: block;
      margin: 0 auto 24px;
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 8px;
    }

    p.sub {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input[type="password"]:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      text-align: center;
    }

    .msg.success {
      background: #ecfdf5;
      color: #065f46;
      display: block;
    }

    .msg.error {
      background: #fef2f2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="logo" src="/assets/reset-password.webp" alt="Nadi" onerror="this.style.display='none'" />
    <h1>Reset your password</h1>
    <p class="sub">Enter a new password for your account.</p>

    <form id="resetForm">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="Enter new password" required minlength="6" />

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Confirm new password" required minlength="6" />

      <button type="submit" id="submitBtn">Reset Password</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var token = path.split('/').pop();
      var apiUrl;

      if (path.startsWith('/user/reset-password/')) {
        apiUrl = '/api/user-account/user/reset-password/' + token;
      } else if (path.startsWith('/technician/reset-password/')) {
        apiUrl = '/api/technician/reset-password/' + token;
      } else {
        apiUrl = '/api/admin/reset-password/' + token;
      }

      var form = document.getElementById('resetForm');
      var btn = document.getElementById('submitBtn');
      var msg = document.getElementById('msg');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.className = 'msg';
        msg.textContent = '';

        var password = document.getElementById('password').value;
        var confirm = document.getElementById('confirm').value;

        if (password !== confirm) {
          msg.textContent = 'Passwords do not match.';
          msg.className = 'msg error';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting…';

        try {
          var res = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password })
          });
          var data = await res.json();

          if (res.ok) {
            msg.textContent = data.message || 'Password reset successful! You can now log in.';
            msg.className = 'msg success';
            form.style.display = 'none';
          } else {
            msg.textContent = data.message || 'Something went wrong. Please try again.';
            msg.className = 'msg error';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
          }
        } catch (err) {
          msg.textContent = 'Network error. Please check your connection and try again.';
          msg.className = 'msg error';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      });
    })();
  </script>
</body>

</html
